<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FootballAI · Tipp Elemző</title>

  <!-- Inline favicon – nincs 404 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0d0f;
      --surface:   #111518;
      --surface2:  #181d21;
      --border:    #232b32;
      --green:     #00e676;
      --green-dim: #00c15e;
      --green-bg:  rgba(0,230,118,.07);
      --yellow:    #ffd740;
      --red:       #ff5252;
      --blue:      #40c4ff;
      --text:      #e8edf0;
      --muted:     #6b7a87;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius:    6px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,230,118,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,118,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* Header */
    header {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-mark {
      width: 44px; height: 44px;
      border: 2px solid var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-weight: 800; font-size: 18px;
      color: var(--green);
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,230,118,.2);
    }

    .header-text h1 {
      font-family: var(--font-head);
      font-size: 28px; font-weight: 800;
      letter-spacing: .04em; text-transform: uppercase; line-height: 1;
    }
    .header-text h1 span { color: var(--green); }
    .header-text p {
      font-size: 12px; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase;
      margin-top: 4px; font-family: var(--font-mono);
    }

    /* Odds status bar (top) */
    .odds-live-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-family: var(--font-mono);
      margin-bottom: 16px;
      border: 1px solid var(--border);
      background: var(--surface2);
    }

    .odds-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .odds-dot.live {
      background: var(--green);
      box-shadow: 0 0 8px rgba(0,230,118,.6);
      animation: pulse 2s ease infinite;
    }
    .odds-dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .odds-live-text { color: var(--muted); flex: 1; }
    .odds-live-text strong { color: var(--text); }

    .odds-refresh-btn {
      background: none; border: none;
      color: var(--muted); font-family: var(--font-mono);
      font-size: 11px; cursor: pointer;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
      transition: color .2s, border-color .2s;
    }
    .odds-refresh-btn:hover { color: var(--green); border-color: var(--green); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 11px; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Input */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    @media (max-width: 520px) {
      .input-grid { grid-template-columns: 1fr; }
      .vs-badge { display: none; }
    }

    .vs-badge {
      font-family: var(--font-head);
      font-size: 20px; font-weight: 800;
      color: var(--muted); text-align: center;
    }

    .field-wrap { display: flex; flex-direction: column; gap: 6px; }
    .field-wrap label {
      font-size: 11px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); font-family: var(--font-mono);
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--green); }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
      font-family: var(--font-head);
      font-size: 14px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 11px 26px;
      border: none; border-radius: var(--radius);
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-primary { background: var(--green); color: #000; }
    .btn-primary:hover:not(:disabled) {
      background: var(--green-dim);
      box-shadow: 0 0 24px rgba(0,230,118,.3);
    }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    .btn-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--muted); }

    /* Status */
    .status-bar {
      display: none;
      align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px; font-family: var(--font-mono);
      margin-top: 14px;
    }
    .status-bar.show    { display: flex; }
    .status-bar.loading { background: rgba(64,196,255,.08); border: 1px solid rgba(64,196,255,.2); color: var(--blue); }
    .status-bar.error   { background: rgba(255,82,82,.08);  border: 1px solid rgba(255,82,82,.2);  color: var(--red); }
    .status-bar.success { background: var(--green-bg);      border: 1px solid rgba(0,230,118,.2);  color: var(--green); }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; }
    #results.show { display: block; animation: fadeUp .4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-header {
      display: flex; align-items: center;
      justify-content: center; gap: 20px;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .team-name {
      font-family: var(--font-head);
      font-size: 26px; font-weight: 800;
      letter-spacing: .02em; text-transform: uppercase;
      flex: 1; text-align: center;
    }
    .match-vs {
      font-family: var(--font-head);
      font-size: 14px; font-weight: 700;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 4px;
    }
    .match-meta {
      text-align: center;
      font-size: 12px; color: var(--muted);
      font-family: var(--font-mono);
      margin-bottom: 24px;
    }

    /* Tips grid */
    .tips-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 12px;
    }
    @media (max-width: 560px) { .tips-grid { grid-template-columns: 1fr; } }

    .tip-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .tip-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--green);
    }
    .tip-card.yellow::before { background: var(--yellow); }
    .tip-card.blue::before   { background: var(--blue); }
    .tip-card.red::before    { background: var(--red); }
    .tip-card.muted::before  { background: var(--muted); }

    .tip-market {
      font-size: 10px; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); font-family: var(--font-mono);
      margin-bottom: 8px;
    }
    .tip-pick {
      font-family: var(--font-head);
      font-size: 22px; font-weight: 800;
      color: var(--green); line-height: 1; margin-bottom: 6px;
    }
    .tip-card.yellow .tip-pick { color: var(--yellow); }
    .tip-card.blue   .tip-pick { color: var(--blue); }
    .tip-card.red    .tip-pick { color: var(--red); }
    .tip-card.muted  .tip-pick { color: var(--muted); }

    .tip-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

    .tip-odds {
      font-family: var(--font-mono); font-size: 13px;
      background: var(--border); padding: 2px 8px; border-radius: 3px;
    }

    .confidence-bar {
      flex: 1; height: 4px;
      background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .confidence-fill {
      height: 100%; background: var(--green);
      border-radius: 2px; transition: width .9s ease;
    }
    .tip-card.yellow .confidence-fill { background: var(--yellow); }
    .tip-card.blue   .confidence-fill { background: var(--blue); }
    .tip-card.muted  .confidence-fill { background: var(--muted); }

    .confidence-val { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .tip-reasoning  { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* Best bet */
    .best-bet-card {
      background: var(--green-bg);
      border: 1px solid rgba(0,230,118,.25);
      border-radius: var(--radius);
      padding: 20px 22px; margin-bottom: 12px;
      position: relative;
    }
    .best-bet-badge {
      position: absolute; top: -1px; right: 16px;
      background: var(--green); color: #000;
      font-family: var(--font-head); font-size: 10px;
      font-weight: 800; letter-spacing: .15em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 0 0 4px 4px;
    }
    .best-bet-market {
      font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--green); font-family: var(--font-mono); margin-bottom: 6px;
    }
    .best-bet-pick {
      font-family: var(--font-head);
      font-size: 30px; font-weight: 800;
      color: var(--text); line-height: 1; margin-bottom: 10px;
    }
    .best-bet-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .odds-pill {
      font-family: var(--font-mono); font-size: 15px;
      background: rgba(0,230,118,.15); color: var(--green);
      padding: 4px 12px; border-radius: 4px;
      border: 1px solid rgba(0,230,118,.3);
    }
    .value-pill {
      font-family: var(--font-mono); font-size: 12px;
      color: var(--yellow); background: rgba(255,215,64,.08);
      border: 1px solid rgba(255,215,64,.2);
      padding: 4px 10px; border-radius: 4px;
    }
    .conf-pill { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .best-bet-reason { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* Analysis */
    .analysis-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
      font-size: 14px; line-height: 1.7; color: var(--text);
    }

    /* Key factors */
    .factors-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .factors-list li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; color: var(--muted);
    }
    .factors-list li::before {
      content: '→'; color: var(--green);
      font-family: var(--font-mono); font-weight: 700;
      flex-shrink: 0; margin-top: 1px;
    }

    /* Risk */
    .risk-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .risk-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      font-family: var(--font-mono); color: var(--muted);
    }
    .risk-badge {
      font-family: var(--font-mono); font-size: 11px;
      padding: 3px 10px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .risk-low    { background: rgba(0,230,118,.12); color: var(--green); border: 1px solid rgba(0,230,118,.25); }
    .risk-medium { background: rgba(255,215,64,.12); color: var(--yellow); border: 1px solid rgba(255,215,64,.25); }
    .risk-high   { background: rgba(255,82,82,.12);  color: var(--red);    border: 1px solid rgba(255,82,82,.25); }

    /* Extra tips */
    .extra-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }
    .extra-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .extra-market {
      font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); font-family: var(--font-mono); margin-bottom: 6px;
    }
    .extra-pick {
      font-family: var(--font-head); font-size: 17px;
      font-weight: 700; color: var(--text); margin-bottom: 4px;
    }
    .extra-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-family: var(--font-mono); color: var(--muted);
    }
    .extra-reasoning { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

    .section-gap { margin-top: 24px; }

    /* Bet trio */
    .bet-trio {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    @media (max-width: 700px) { .bet-trio { grid-template-columns: 1fr; } }

    .bet-card {
      border-radius: var(--radius);
      padding: 18px 18px 14px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bet-safe   { background: rgba(0,230,118,.06);  border-color: rgba(0,230,118,.25); }
    .bet-medium { background: rgba(255,215,64,.06); border-color: rgba(255,215,64,.25); }
    .bet-risky  { background: rgba(255,82,82,.06);  border-color: rgba(255,82,82,.25); }

    .bet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .bet-label  { font-family: var(--font-head); font-size: 13px; font-weight: 800; letter-spacing: .05em; }
    .bet-safe   .bet-label { color: var(--green); }
    .bet-medium .bet-label { color: var(--yellow); }
    .bet-risky  .bet-label { color: var(--red); }

    .bet-sub    { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
    .bet-market { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 6px; }
    .bet-pick   { font-family: var(--font-head); font-size: 24px; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 10px; }
    .bet-footer { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

    .bet-odds {
      font-family: var(--font-mono); font-size: 14px; font-weight: 600;
      padding: 3px 10px; border-radius: 4px;
    }
    .bet-safe   .bet-odds { background: rgba(0,230,118,.15);  color: var(--green);  border: 1px solid rgba(0,230,118,.3); }
    .bet-medium .bet-odds { background: rgba(255,215,64,.15); color: var(--yellow); border: 1px solid rgba(255,215,64,.3); }
    .bet-risky  .bet-odds { background: rgba(255,82,82,.15);  color: var(--red);    border: 1px solid rgba(255,82,82,.3); }

    .bet-conf   { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .bet-reason { font-size: 12px; color: var(--muted); line-height: 1.5; }

    footer {
      margin-top: 60px; padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center; font-size: 11px;
      color: var(--muted); font-family: var(--font-mono);
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-mark">FA</div>
    <div class="header-text">
      <h1>Football<span>AI</span></h1>
      <p>AI-alapú meccs elemzés &amp; tipp generátor</p>
    </div>
  </header>

  <!-- Odds live státusz -->
  <div class="odds-live-bar" id="oddsBar">
    <div class="odds-dot" id="oddsDot"></div>
    <span class="odds-live-text" id="oddsText">TippmixPro odds betöltése…</span>
    <button class="odds-refresh-btn" onclick="loadOdds()">↻ Frissít</button>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-title">Mérkőzés beállítása</div>

    <div class="input-grid">
      <div class="field-wrap">
        <label>Hazai csapat</label>
        <input type="text" id="homeTeam" placeholder="pl. Ferencváros" />
      </div>
      <div class="vs-badge">VS</div>
      <div class="field-wrap">
        <label>Vendég csapat</label>
        <input type="text" id="awayTeam" placeholder="pl. Paks" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">
        <span>⚡</span> Elemzés indítása
      </button>
      <button class="btn btn-secondary" onclick="clearAll()">Törlés</button>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="spinner" id="statusSpinner" style="display:none"></div>
      <span id="statusText"></span>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="match-header">
      <div class="team-name" id="resHome">—</div>
      <div class="match-vs">VS</div>
      <div class="team-name" id="resAway">—</div>
    </div>
    <div class="match-meta" id="resMeta"></div>

    <div class="bet-trio" id="betTrio"></div>

    <div class="tips-grid" id="tipsGrid"></div>

    <div id="extraSection" style="display:none">
      <div class="card-title section-gap">Extra tippek</div>
      <div class="extra-grid" id="extraGrid"></div>
    </div>

    <div class="card-title section-gap">Elemzés</div>
    <div class="analysis-box" id="analysisBox"></div>

    <div class="tips-grid">
      <div class="card">
        <div class="card-title">Kulcstényezők</div>
        <ul class="factors-list" id="factorsList"></ul>
      </div>
      <div class="card">
        <div class="card-title">Kockázat</div>
        <div class="risk-row">
          <span class="risk-label">Szint:</span>
          <span class="risk-badge" id="riskBadge"></span>
        </div>
        <p style="font-size:13px;color:var(--muted);margin-top:12px;" id="riskNote"></p>
      </div>
    </div>

    <div style="margin-top:12px;text-align:right;">
      <span style="font-size:11px;color:var(--muted);font-family:var(--font-mono);" id="genMeta"></span>
    </div>
  </div>

  <footer>
    FootballAI · llm7.io &amp; API-Football · Csak szórakozásra, nem pénzügyi tanács
  </footer>
</div>

<script>
// ── Globális state ────────────────────────────────────────────────────────────
let liveScraperData = null;   // automatikusan betöltött TippmixPro odds
let oddsLoadedAt    = null;

// ── Odds automatikus betöltés ─────────────────────────────────────────────────
async function loadOdds() {
  const dot  = document.getElementById('oddsDot');
  const text = document.getElementById('oddsText');
  dot.className  = 'odds-dot';
  text.innerHTML = 'Betöltés…';

  try {
    const res  = await fetch('/api/odds-sync');
    const data = await res.json();

    if (data.hasData && data.data?.length) {
      liveScraperData = data;
      oddsLoadedAt    = data.savedAt || data.timestamp;
      const count     = data.marketCount || data.data.length;
      const ago       = timeAgo(oddsLoadedAt);
      dot.className   = 'odds-dot live';
      text.innerHTML  = `<strong>Élő odds betöltve</strong> · ${count} piac · ${ago}`;
    } else {
      liveScraperData = null;
      dot.className   = 'odds-dot error';
      text.innerHTML  = 'Nincs aktív odds – indítsd el a TippmixPro scrappert';
    }
  } catch (err) {
    dot.className  = 'odds-dot error';
    text.innerHTML = `Odds betöltési hiba: ${err.message}`;
  }
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Math.round((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 60)   return `${diff}mp`
  if (diff < 3600) return `${Math.floor(diff/60)}p`
  return `${Math.floor(diff/3600)}ó`;
}

// Betöltés oldalnyitáskor, majd 30 másodpercenként automatikusan frissít
loadOdds();
setInterval(loadOdds, 30_000);

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = `status-bar show ${type}`;
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusSpinner').style.display = type === 'loading' ? 'block' : 'none';
}
function hideStatus() {
  document.getElementById('statusBar').className = 'status-bar';
}

function clearAll() {
  document.getElementById('homeTeam').value = '';
  document.getElementById('awayTeam').value = '';
  document.getElementById('results').classList.remove('show');
  hideStatus();
}

// ── Elemzés ───────────────────────────────────────────────────────────────────
async function analyze() {
  const homeTeam = document.getElementById('homeTeam').value.trim();
  const awayTeam = document.getElementById('awayTeam').value.trim();

  if (!homeTeam || !awayTeam) {
    setStatus('error', 'Add meg mindkét csapat nevét!');
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('results').classList.remove('show');

  try {
    // 1. Statisztikák
    setStatus('loading', `Statisztikák lekérése: ${homeTeam} vs ${awayTeam}…`);
    let matchData = null;

    try {
      const r = await fetch('/api/football-data', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ homeTeam, awayTeam }),
      });
      const j = await r.json();
      if (r.ok) {
        matchData = j;
        if (j.noData) {
          setStatus('loading', 'Statisztika nem elérhető – AI elemzés csak odds alapján folytatódik…');
          await new Promise(r => setTimeout(r, 1200));
        }
      } else {
        console.warn('football-data:', j.error);
      }
    } catch (e) {
      console.warn('football-data fetch:', e.message);
    }

    // 2. AI tipp
    setStatus('loading', 'AI elemzés generálása…');

    const tipRes = await fetch('/api/football-tips', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        homeTeam,
        awayTeam,
        matchData,
        scraperData: liveScraperData,   // automatikusan betöltött odds
      }),
    });

    const tipJson = await tipRes.json();
    if (!tipRes.ok || tipJson.error) throw new Error(tipJson.error || 'Ismeretlen hiba');

    setStatus('success', `Elemzés kész! ${liveScraperData ? '· Odds felhasználva ✓' : '· Odds nincs'}`);
    renderResults(homeTeam, awayTeam, tipJson);

  } catch (err) {
    setStatus('error', `Hiba: ${err.message}`);
  } finally {
    btn.disabled = false;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResults(homeTeam, awayTeam, data) {
  const tips = data.tips;
  if (!tips) { setStatus('error', 'Nincs tipp adat'); return; }

  document.getElementById('resHome').textContent = homeTeam;
  document.getElementById('resAway').textContent = awayTeam;

  const fix = data.matchData?.nextFixture;
  document.getElementById('resMeta').textContent =
    [fix?.date, fix?.league].filter(Boolean).join(' · ') ||
    new Date(data.meta?.generatedAt || Date.now()).toLocaleString('hu');

  // 3 tipp kategória
  const trio = document.getElementById('betTrio');
  trio.innerHTML = '';
  const betDefs = [
    { key: 'safeBet',   label: '🟢 Biztos Tipp',   sub: 'Alacsony rizikó',   cls: 'safe'   },
    { key: 'mediumBet', label: '🟡 Közepes Tipp',   sub: '2k → ~6-9k',       cls: 'medium' },
    { key: 'riskyBet',  label: '🔴 Rizikós Tipp',   sub: 'Nagy odds / nyeremény', cls: 'risky'  },
  ];
  for (const bd of betDefs) {
    const b = tips[bd.key];
    if (!b) continue;
    const card = document.createElement('div');
    card.className = `bet-card bet-${bd.cls}`;
    card.innerHTML = `
      <div class="bet-header">
        <span class="bet-label">${bd.label}</span>
        <span class="bet-sub">${bd.sub}</span>
      </div>
      <div class="bet-market">${b.market || ''}</div>
      <div class="bet-pick">${b.pick || ''}</div>
      <div class="bet-footer">
        <span class="bet-odds">${b.odds ? '@' + b.odds : 'odds n/a'}</span>
        <span class="bet-conf">${b.confidence ? b.confidence + '% bizalom' : ''}</span>
      </div>
      <div class="bet-reason">${b.reasoning || ''}</div>
    `;
    trio.appendChild(card);
  }

  // Tips grid
  const grid = document.getElementById('tipsGrid');
  grid.innerHTML = '';

  const defs = [
    { key: 'matchResult', label: '1X2 Eredmény',  color: '',       fmt: t => t.prediction },
    { key: 'overUnder',   label: 'Over / Under',   color: 'yellow', fmt: t => `${(t.prediction||'').toUpperCase()} ${t.line??''}` },
    { key: 'btts',        label: 'Mindkét csapat', color: 'blue',   fmt: t => t.prediction ? 'IGEN ✓' : 'NEM ✗' },
    { key: 'corners',     label: 'Szöglet',        color: 'muted',  fmt: t => t.prediction && t.line ? `${(t.prediction).toUpperCase()} ${t.line}` : t.prediction ? (t.prediction).toUpperCase() : '—' },
    { key: 'cards',       label: 'Lapok',          color: 'red',    fmt: t => t.prediction && t.line ? `${(t.prediction).toUpperCase()} ${t.line}` : t.prediction ? (t.prediction).toUpperCase() : '—' },
  ];

  for (const d of defs) {
    const t = tips[d.key];
    if (!t) continue;
    const el = document.createElement('div');
    el.className = `tip-card ${d.color}`;
    el.innerHTML = `
      <div class="tip-market">${d.label}</div>
      <div class="tip-pick">${d.fmt(t)}</div>
      <div class="tip-meta">
        ${t.odds ? `<div class="tip-odds">@${t.odds}</div>` : ''}
        <div class="confidence-bar">
          <div class="confidence-fill" style="width:0%" data-target="${t.confidence||0}"></div>
        </div>
        <div class="confidence-val">${t.confidence??'—'}%</div>
      </div>
      <div class="tip-reasoning">${t.reasoning||''}</div>`;
    grid.appendChild(el);
  }

  requestAnimationFrame(() => {
    document.querySelectorAll('.confidence-fill').forEach(el => {
      el.style.width = (el.dataset.target || 0) + '%';
    });
  });

  // Extra tips
  const extraGrid = document.getElementById('extraGrid');
  const extraSec  = document.getElementById('extraSection');
  extraGrid.innerHTML = '';

  if (tips.extraTips?.length) {
    extraSec.style.display = 'block';
    for (const et of tips.extraTips) {
      const ec = document.createElement('div');
      ec.className = 'extra-card';
      ec.innerHTML = `
        <div class="extra-market">${et.market||''}</div>
        <div class="extra-pick">${et.pick||''}</div>
        <div class="extra-meta">
          ${et.odds ? `@${et.odds}` : ''}
          <span>${et.confidence ? `${et.confidence}%` : ''}</span>
        </div>
        <div class="extra-reasoning">${et.reasoning||''}</div>`;
      extraGrid.appendChild(ec);
    }
  } else {
    extraSec.style.display = 'none';
  }

  // Analysis
  document.getElementById('analysisBox').textContent = tips.analysis || '—';

  // Factors
  const fl = document.getElementById('factorsList');
  fl.innerHTML = '';
  (tips.keyFactors || []).forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    fl.appendChild(li);
  });

  // Risk
  const risk = tips.riskLevel || 'medium';
  const rb   = document.getElementById('riskBadge');
  rb.textContent = risk === 'low' ? 'Alacsony' : risk === 'high' ? 'Magas' : 'Közepes';
  rb.className   = `risk-badge risk-${risk}`;
  document.getElementById('riskNote').textContent =
    risk === 'low'  ? 'Stabil forma, egyértelmű statisztikák.' :
    risk === 'high' ? 'Kevés adat vagy bizonytalan forma.' :
                      'Közepes bizonytalanság, körültekintően fogadj.';

  // Meta
  const m = data.meta || {};
  document.getElementById('genMeta').textContent =
    `odds:${m.oddsUsed?'✓':'✗'} stat:${m.statsUsed?'✓':'✗'} · ${m.model||''}`;

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
